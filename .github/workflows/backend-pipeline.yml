name: Backend Pipeline

on:
  push:
    branches:
      - master
      - main
      - develop

  pull_request:
    branches:
      - master
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/contatodo

jobs:

  ci:
    name: CI - Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn clean compile

      - name: Test
        run: mvn test

      - name: Package
        run: mvn package -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar

      - name: Verify Docker Build
        run: docker build -t contatodo-backend:test .

  cd:
    name: CD - Build & Push Docker
    needs: ci

    if: github.event_name == 'push' && (github.ref_name == 'master' || github.ref_name == 'main')

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image-ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        name: Resolve Image Tags
        shell: bash
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"

          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          IMAGE_REF="${IMAGE}:${BRANCH}-${SHORT_SHA}"

          {
            echo "tags<<EOF"
            echo "${IMAGE}:${BRANCH}"
            echo "${IMAGE_REF}"

            if [[ "$BRANCH" == "master" || "$BRANCH" == "main" ]]; then
              echo "${IMAGE}:latest"
            fi

            echo EOF
            echo "image_ref=${IMAGE_REF}"
          } >> "$GITHUB_OUTPUT"

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:

    name: Deploy EC2

    needs: cd

    if: github.event_name == 'push' && github.ref_name == 'master'

    runs-on: ubuntu-latest

    environment: master

    env:
      EC2_APP_DIR: /opt/contatodo
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

    steps:

      - uses: actions/checkout@v4

      - name: Generate .env
        shell: bash
        env:
          DEPLOY_IMAGE: ${{ needs.cd.outputs.image-ref }}
          APP_NAME: ${{ secrets.APP_NAME }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          MONGO_DATABASE: ${{ secrets.MONGO_DATABASE }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          BCRYPT_STRENGTH: ${{ secrets.BCRYPT_STRENGTH }}
        run: |

          mkdir -p .deploy-out

          cat > .deploy-out/contatodo.env <<EOF
          CONTATODO_IMAGE=${DEPLOY_IMAGE}
          APP_NAME=${APP_NAME}
          SERVER_PORT=${SERVER_PORT}
          MONGO_DATABASE=${MONGO_DATABASE}
          MONGO_URI=${MONGO_URI}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRATION=${JWT_EXPIRATION}
          BCRYPT_STRENGTH=${BCRYPT_STRENGTH}
          EOF

      - name: Upload files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          source: ".deploy-out/contatodo.env,deploy/docker-compose.ec2.yml,deploy/deploy-ec2.sh"
          target: "/tmp/contatodo-deploy-${{ github.run_id }}"
          overwrite: true

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            set -eu

            bundle="/tmp/contatodo-deploy-${{ github.run_id }}"

            chmod +x "$bundle/deploy/deploy-ec2.sh"

            "$bundle/deploy/deploy-ec2.sh" \
              "$bundle" \
              "${{ env.EC2_APP_DIR }}"